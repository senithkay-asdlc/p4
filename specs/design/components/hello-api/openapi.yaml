openapi: 3.0.3
info:
  title: Hello World API
  version: 0.1.0
  description: Minimal API returning a greeting and exposing a health check.
servers:
  - url: /
paths:
  /hello:
    get:
      operationId: getGreeting
      summary: Get a greeting message
      responses:
        '200':
          description: Greeting returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Greeting'
  /health:
    get:
      operationId: getHealth
      summary: Liveness check
      responses:
        '200':
          description: Service is running normally
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
components:
  schemas:
    Greeting:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Friendly greeting text
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Health status label
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: HTTP or application error code
        message:
          type: string
          description: short human-readable label
        description:
          type: string
          description: detailed explanation
        moreInfo:
          type: string
          description: URI to documentation
